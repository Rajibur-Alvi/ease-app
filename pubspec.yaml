name: ease_app
description: "Ease — emotional wellbeing and gentle connection app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^17.2.2

  # State management
  provider: ^6.1.5+1

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  lucide_icons: ^0.257.0

  # Local persistence
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2
  path: ^1.9.1

  # Network
  connectivity_plus: ^6.1.4
  http: ^1.4.0

  # Features
  url_launcher: ^6.3.1
  speech_to_text: ^7.2.1
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  rxdart: ^0.28.0

  # Shimmer loading
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
